version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guia-bandeiras-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CORS_ALLOWED_ORIGINS=http://localhost:4200,http://localhost:80
    networks:
      - guia-bandeiras-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/faq"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guia-bandeiras-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - guia-bandeiras-network
    environment:
      - API_URL=http://backend:8080

networks:
  guia-bandeiras-network:
    driver: bridge

spring.application.name=guia-das-bandeiras-backend
server.port=8080

# Database configuration
spring.datasource.url=jdbc:h2:mem:guia_bandeiras;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cache configuration
spring.cache.cache-names=searchResults,faqCache,glossaryCache,dashboardCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=1h

# JWT configuration
jwt.secret=guiaBandeirasSecretKey2024ForJWTTokenGeneration
jwt.expiration=86400000

# Logging
logging.level.com.guia.bandeiras=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/guia-bandeiras.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# CORS configuration
cors.allowed-origins=http://localhost:4201,http://localhost:80

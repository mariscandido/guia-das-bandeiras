spring.application.name=guia-das-bandeiras-backend
server.port=8080

# Cache configuration
spring.cache.cache-names=searchResults,faqCache
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=1h

# Logging
logging.level.com.guia.bandeiras=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS configuration
cors.allowed-origins=http://localhost:4200,http://localhost:80

<div class="notification-container">
  <button mat-icon-button (click)="togglePanel()" class="notification-button">
    <mat-icon>notifications</mat-icon>
    <ng-container *ngIf="unreadCount$ | async as count">
      <span *ngIf="count > 0" class="badge">
        {{ count }}
      </span>
    </ng-container>
  </button>

  <div *ngIf="isOpen" class="notification-panel" [@fadeIn]>
    <div class="panel-header">
      <h3>Notificações</h3>
      <div class="panel-actions">
        <button mat-button (click)="markAllAsRead()" [disabled]="(unreadCount$ | async) === 0">
          Marcar todas como lidas
        </button>
        <button mat-button (click)="clearAll()">Limpar</button>
      </div>
    </div>

    <div class="notification-list">
      <div *ngIf="(notifications$ | async) as notifications" class="notification-list-content">
        <div *ngIf="notifications.length === 0" class="no-notifications">
          <mat-icon>notifications_none</mat-icon>
          <p>Nenhuma notificação</p>
        </div>

        <div 
          *ngFor="let notification of notifications" 
          class="notification-item"
          [class.unread]="!notification.read"
          (click)="markAsRead(notification.id)">
          <div class="notification-icon" [style.color]="getNotificationColor(notification.type)">
            <mat-icon>{{ getNotificationIcon(notification.type) }}</mat-icon>
          </div>
          <div class="notification-content">
            <p class="notification-message">{{ notification.message }}</p>
            <p class="notification-time">{{ notification.timestamp | date:'short' }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

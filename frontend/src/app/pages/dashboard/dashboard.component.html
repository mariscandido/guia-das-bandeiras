<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Estatísticas de uso e tendências</p>
  </div>

  <div class="stats-cards">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>search</mat-icon>
        </div>
        <div class="stat-content">
          <p class="stat-label">Total de Buscas</p>
          <p class="stat-value">{{ stats.totalSearches }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>people</mat-icon>
        </div>
        <div class="stat-content">
          <p class="stat-label">Usuários Únicos</p>
          <p class="stat-value">{{ stats.uniqueUsers }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon">
          <mat-icon>speed</mat-icon>
        </div>
        <div class="stat-content">
          <p class="stat-label">Tempo Médio de Resposta</p>
          <p class="stat-value">{{ stats.avgResponseTime }}s</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="charts-grid">
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Buscas por Bandeira</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #searchesByBrandChart></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Termos Mais Buscados</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #topSearchesChart></canvas>
      </mat-card-content>
    </mat-card>

    <mat-card class="chart-card full-width">
      <mat-card-header>
        <mat-card-title>Tendência de Buscas (Últimos 7 dias)</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <canvas #searchTrendsChart></canvas>
      </mat-card-content>
    </mat-card>
  </div>
</div>

<div class="faq-container">
  <h1 class="faq-title">Perguntas Frequentes</h1>
  <p class="faq-subtitle">Dúvidas comuns sobre processamentos de cartões e bandeiras</p>

  <div *ngIf="loading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Carregando FAQ...</p>
  </div>

  <div *ngIf="error" class="error-container">
    <mat-icon>error_outline</mat-icon>
    <p>{{ error }}</p>
  </div>

  <div *ngIf="!loading && !error" class="faq-content">
    <div *ngFor="let category of getCategories()" class="category-section">
      <h2 class="category-title">{{ category }}</h2>
      <mat-accordion class="faq-accordion">
        <mat-expansion-panel *ngFor="let item of getItemsByCategory(category)">
          <mat-expansion-panel-header>
            <mat-panel-title>
              {{ item.question }}
            </mat-panel-title>
          </mat-expansion-panel-header>
          <p class="faq-answer">{{ item.answer }}</p>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
  </div>
</div>
